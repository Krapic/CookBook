          gh issue create \
            --repo "$REPO" \
            --title "Final bug fixing" \
            --label "bug" \
            --body $'## Opis\n          Posljednje ispravljanje grešaka prije predaje projekta.\n\n          ## Zadaci\n          - [ ] Testiraj na stvarnom uređaju\n          - [ ] Provjeri performansu na slabijim uređajima\n          - [ ] Popravi sve crash-eve\n          - [ ] Provjeri rubne slučajeve (prazni unosi, nema interneta...)' || true
