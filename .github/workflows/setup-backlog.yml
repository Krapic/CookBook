name: Setup Project Backlog

on:
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  setup-labels:
    name: Create Labels
    runs-on: ubuntu-latest
    steps:
      - name: Create labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          create_label() {
            local name="$1" color="$2" description="$3"
            gh api repos/$REPO/labels \
              --method POST \
              -f name="$name" \
              -f color="$color" \
              -f description="$description" 2>/dev/null \
            || gh api repos/$REPO/labels/"$(echo "$name" | sed 's/ /%20/g')" \
              --method PATCH \
              -f color="$color" \
              -f description="$description" 2>/dev/null \
            || true
          }

          create_label "setup"        "0075ca" "Project setup and configuration"
          create_label "architecture" "e4e669" "Architecture and code structure"
          create_label "firebase"     "f9d0c4" "Firebase backend tasks"
          create_label "auth"         "d93f0b" "Authentication related tasks"
          create_label "ui"           "bfd4f2" "User interface tasks"
          create_label "backend"      "0052cc" "Backend and data layer tasks"
          create_label "ai"           "5319e7" "AI / Gemini integration tasks"
          create_label "social"       "e99695" "Social features"
          create_label "feature"      "84b6eb" "New feature"
          create_label "bug"          "ee0701" "Bug fix"
          create_label "testing"      "c5def5" "Testing tasks"
          create_label "polish"       "fef2c0" "Polishing and UX improvements"

  create-issues:
    name: Create Backlog Issues
    runs-on: ubuntu-latest
    needs: setup-labels
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
    steps:

      # ── 1. Setup projekta ──────────────────────────────────────────────────
      - name: "Setup - Setup Android project (Compose)"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Setup Android project (Compose)" \
            --label "setup,feature" \
            --body "## Opis
          Inicijalizirati novi Android projekt s Jetpack Compose podrškom.

          ## Zadaci
          - [ ] Kreiraj novi Android projekt u Android Studiju
          - [ ] Odaberi Jetpack Compose template
          - [ ] Postavi minimalni SDK (API 26+)
          - [ ] Provjeri da se projekt kompajlira i pokreće na emulatoru" || true

      - name: "Setup - Setup Git repository"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Setup Git repository" \
            --label "setup,feature" \
            --body "## Opis
          Inicijalizirati Git repozitorij i podesiti osnovnu strukturu.

          ## Zadaci
          - [ ] Inicijalizirati Git repozitorij
          - [ ] Dodati `.gitignore` za Android projekte
          - [ ] Kreirati inicijalni commit
          - [ ] Objaviti na GitHub" || true

      - name: "Setup - Setup GitHub project board"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Setup GitHub project board" \
            --label "setup,feature" \
            --body "## Opis
          Kreirati GitHub Project board s kolonama za praćenje toka rada.

          ## Zadaci
          - [ ] Kreiraj novi GitHub Project (Projects v2)
          - [ ] Dodaj kolone: Backlog → Ready → In progress → In review → Done
          - [ ] Poveži projekt s repozitorijem
          - [ ] Dodaj sve taskove u Backlog" || true

      - name: "Setup - Setup project package structure"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Setup project package structure" \
            --label "setup,architecture" \
            --body "## Opis
          Kreirati osnovnu strukturu paketa prema MVVM arhitekturi.

          ## Struktura
          \`\`\`
          com.cookbook
          ├── data
          │   ├── local
          │   ├── remote
          │   └── repository
          ├── domain
          │   ├── model
          │   └── usecase
          ├── ui
          │   ├── screens
          │   ├── components
          │   └── navigation
          └── util
          \`\`\`

          ## Zadaci
          - [ ] Kreiraj sve direktorije i placeholder klase
          - [ ] Provjeri da se projekt kompajlira" || true

      - name: "Setup - Configure Gradle dependencies"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Configure Gradle dependencies" \
            --label "setup,feature" \
            --body "## Opis
          Dodati sve potrebne ovisnosti u \`build.gradle.kts\`.

          ## Ovisnosti
          - [ ] Jetpack Compose BOM
          - [ ] Navigation Compose
          - [ ] Firebase BOM (Auth, Firestore, Storage)
          - [ ] Hilt (dependency injection)
          - [ ] Coil (učitavanje slika)
          - [ ] Kotlin Coroutines
          - [ ] Lifecycle ViewModel Compose
          - [ ] Retrofit / OkHttp (ako treba za Gemini)
          - [ ] Gemini Android SDK" || true

      - name: "Setup - Setup navigation structure"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Setup navigation structure" \
            --label "setup,ui" \
            --body "## Opis
          Implementirati Navigation Compose s definiranim rutama za sve ekrane.

          ## Zadaci
          - [ ] Dodaj Navigation Compose ovisnost
          - [ ] Definiraj \`Screen\` sealed class / enum s rutama
          - [ ] Kreiraj \`AppNavHost\` composable
          - [ ] Postavi početni ekran (Login ili Home)
          - [ ] Provjeri navigaciju između ekrana" || true

      # ── 2. Arhitektura projekta ────────────────────────────────────────────
      - name: "Architecture - Create base MVVM architecture"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Create base MVVM architecture" \
            --label "architecture,feature" \
            --body "## Opis
          Postaviti temelje MVVM arhitekture koja će se koristiti kroz cijeli projekt.

          ## Zadaci
          - [ ] Definiraj \`BaseViewModel\` s uobičajenim state managementom
          - [ ] Postavi \`UiState\` sealed class
          - [ ] Konfiguriraj Hilt za dependency injection
          - [ ] Dokumentiraj arhitekturne smjernice u README" || true

      - name: "Architecture - Create project package structure (data/domain/ui)"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Create project package structure (data/domain/ui)" \
            --label "architecture,setup" \
            --body "## Opis
          Kreirati i popuniti osnovnu strukturu paketa s placeholder klasama.

          ## Paketi
          - [ ] \`data/local\` — Room entiteti i DAO
          - [ ] \`data/remote\` — Firebase i Gemini API klijenti
          - [ ] \`data/repository\` — implementacije repozitorija
          - [ ] \`domain/model\` — domenski modeli
          - [ ] \`domain/usecase\` — use case klase
          - [ ] \`ui/screens\` — ekrani aplikacije
          - [ ] \`ui/components\` — višekratni Compose komponente
          - [ ] \`ui/navigation\` — navigacijska logika" || true

      - name: "Architecture - Setup ViewModel base structure"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Setup ViewModel base structure" \
            --label "architecture,feature" \
            --body "## Opis
          Kreirati bazni ViewModel s podrškom za Hilt i lifecycle-aware state management.

          ## Zadaci
          - [ ] Kreiraj \`BaseViewModel : ViewModel()\`
          - [ ] Dodaj \`StateFlow\` za UI state
          - [ ] Dodaj \`SharedFlow\` za jednokratne događaje (navigation, snackbar)
          - [ ] Testiraj s jednostavnim primjerom" || true

      - name: "Architecture - Setup Repository pattern"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Setup Repository pattern" \
            --label "architecture,backend" \
            --body "## Opis
          Implementirati Repository pattern koji apstrahira izvore podataka.

          ## Zadaci
          - [ ] Definiraj sučelja (interfaces) za svaki repozitorij
          - [ ] Kreiraj implementacije koje koriste Firebase / lokalna baza
          - [ ] Registriraj repozitorije s Hilt modulima
          - [ ] Provjeri ispravno ubrizgavanje ovisnosti" || true

      - name: "Architecture - Create Result / Resource wrapper for network calls"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Create Result / Resource wrapper for network calls" \
            --label "architecture,backend" \
            --body "## Opis
          Kreirati generički wrapper koji omotava rezultate mrežnih/Firebase poziva.

          ## Implementacija
          \`\`\`kotlin
          sealed class Resource<T> {
              data class Success<T>(val data: T) : Resource<T>()
              data class Error<T>(val message: String) : Resource<T>()
              class Loading<T> : Resource<T>()
          }
          \`\`\`

          ## Zadaci
          - [ ] Implementiraj \`Resource<T>\` sealed class
          - [ ] Koristi ga u svim repozitorijima
          - [ ] Provjeri rukovanje greškama u ViewModelu" || true

      # ── 3. Firebase setup ──────────────────────────────────────────────────
      - name: "Firebase - Create Firebase project"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Create Firebase project" \
            --label "firebase,setup" \
            --body "## Opis
          Kreirati Firebase projekt za CookBook aplikaciju.

          ## Zadaci
          - [ ] Prijavi se na Firebase Console (console.firebase.google.com)
          - [ ] Kreiraj novi projekt: \`cookbook-ai\`
          - [ ] Aktiviraj Google Analytics (opcionalno)
          - [ ] Zapamti Project ID za konfiguraciju" || true

      - name: "Firebase - Connect Android app to Firebase"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Connect Android app to Firebase" \
            --label "firebase,setup" \
            --body "## Opis
          Povezati Android aplikaciju s Firebase projektom.

          ## Zadaci
          - [ ] Registriraj Android app u Firebase Consoleu
          - [ ] Preuzmi \`google-services.json\` i stavi u \`app/\`
          - [ ] Dodaj Firebase BOM i plugin u Gradle
          - [ ] Provjeri da se aplikacija uspješno pokreće s Firebase" || true

      - name: "Firebase - Setup Firebase Authentication"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Setup Firebase Authentication" \
            --label "firebase,auth" \
            --body "## Opis
          Konfigurirati Firebase Authentication za email/lozinka prijavu.

          ## Zadaci
          - [ ] Aktiviraj Email/Password provider u Firebase Consoleu
          - [ ] Dodaj \`firebase-auth\` ovisnost
          - [ ] Inicijaliziraj \`FirebaseAuth\` instance
          - [ ] Testiraj s test korisnikom" || true

      - name: "Firebase - Setup Firestore database"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Setup Firestore database" \
            --label "firebase,backend" \
            --body "## Opis
          Konfigurirati Cloud Firestore bazu podataka.

          ## Zadaci
          - [ ] Aktiviraj Firestore u Firebase Consoleu (Native mode)
          - [ ] Postavi sigurnosna pravila (development mode)
          - [ ] Dodaj \`firebase-firestore\` ovisnost
          - [ ] Testiraj čitanje/pisanje s jednostavnim dokumentom" || true

      - name: "Firebase - Setup Firebase Storage (images)"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Setup Firebase Storage (images)" \
            --label "firebase,backend" \
            --body "## Opis
          Konfigurirati Firebase Storage za pohranu slika recepata.

          ## Zadaci
          - [ ] Aktiviraj Firebase Storage u Firebase Consoleu
          - [ ] Postavi sigurnosna pravila za Storage
          - [ ] Dodaj \`firebase-storage\` ovisnost
          - [ ] Testiraj upload i download slike" || true

      - name: "Firebase - Define Firestore database schema"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Define Firestore database schema" \
            --label "firebase,backend,architecture" \
            --body "## Opis
          Definirati strukturu Firestore kolekcija i dokumenata.

          ## Schema
          ### Kolekcija \`users\`
          \`\`\`
          users/{userId}
            - uid: String
            - displayName: String
            - email: String
            - photoUrl: String
            - bio: String
            - followers: List<String>
            - following: List<String>
            - createdAt: Timestamp
          \`\`\`

          ### Kolekcija \`recipes\`
          \`\`\`
          recipes/{recipeId}
            - id: String
            - title: String
            - description: String
            - imageUrl: String
            - authorId: String
            - authorName: String
            - ingredients: List<Ingredient>
            - steps: List<Step>
            - tags: List<String>
            - averageRating: Double
            - ratingCount: Int
            - likeCount: Int
            - likedBy: List<String>
            - createdAt: Timestamp
          \`\`\`

          ### Kolekcija \`ratings\`
          \`\`\`
          ratings/{recipeId}/userRatings/{userId}
            - userId: String
            - rating: Int (1-5)
            - createdAt: Timestamp
          \`\`\`

          ## Zadaci
          - [ ] Dokumentiraj schema u kodu (data classes)
          - [ ] Kreiraj Firestore sigurnosna pravila
          - [ ] Provjeri indekse za query optimizaciju" || true

      # ── 4. Authentication ──────────────────────────────────────────────────
      - name: "Auth - Implement user registration"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Implement user registration" \
            --label "auth,feature,firebase" \
            --body "## Opis
          Implementirati ekran i logiku za registraciju novih korisnika.

          ## Zadaci
          - [ ] Kreiraj \`RegisterScreen\` (email, lozinka, potvrda lozinke)
          - [ ] Implementiraj validaciju forme
          - [ ] Pozovi \`FirebaseAuth.createUserWithEmailAndPassword()\`
          - [ ] Kreiraj korisnički dokument u Firestoreu
          - [ ] Preusmjeri na Home ekran nakon uspješne registracije" || true

      - name: "Auth - Implement user login"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Implement user login" \
            --label "auth,feature,firebase" \
            --body "## Opis
          Implementirati ekran i logiku za prijavu korisnika.

          ## Zadaci
          - [ ] Kreiraj \`LoginScreen\` (email, lozinka)
          - [ ] Implementiraj validaciju
          - [ ] Pozovi \`FirebaseAuth.signInWithEmailAndPassword()\`
          - [ ] Rukuj greškama (pogrešna lozinka, korisnik ne postoji)
          - [ ] Preusmjeri na Home ekran" || true

      - name: "Auth - Implement logout"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Implement logout" \
            --label "auth,feature" \
            --body "## Opis
          Implementirati funkcionalnost odjave korisnika.

          ## Zadaci
          - [ ] Dodaj opciju odjave u Profile ekranu
          - [ ] Pozovi \`FirebaseAuth.signOut()\`
          - [ ] Ukloni lokalnu sesiju
          - [ ] Preusmjeri na Login ekran" || true

      - name: "Auth - Create user profile document in Firestore"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Create user profile document in Firestore" \
            --label "auth,firebase,backend" \
            --body "## Opis
          Nakon registracije automatski kreirati korisnički dokument u Firestoreu.

          ## Zadaci
          - [ ] U \`AuthRepository\` nakon registracije kreiraj \`User\` dokument
          - [ ] Pohrani: uid, email, displayName, createdAt
          - [ ] Rukuj greškama pri kreiranju dokumenta" || true

      - name: "Auth - Persist logged in user session"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Persist logged in user session" \
            --label "auth,feature" \
            --body "## Opis
          Pohraniti korisničku sesiju kako aplikacija ne bi tražila ponovnu prijavu.

          ## Zadaci
          - [ ] Firebase Auth automatski čuva sesiju — provjeri da radi
          - [ ] Na startu aplikacije provjeri \`FirebaseAuth.currentUser\`
          - [ ] Preusmjeri na odgovarajući ekran (Home ili Login)
          - [ ] Testiraj scenarij: zatvori aplikaciju i ponovo otvori" || true

      # ── 5. Recipe data model ───────────────────────────────────────────────
      - name: "Data - Create Recipe data model"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Create Recipe data model" \
            --label "backend,feature" \
            --body "## Opis
          Kreirati domenski model za recept.

          ## Implementacija
          \`\`\`kotlin
          data class Recipe(
              val id: String = \"\",
              val title: String = \"\",
              val description: String = \"\",
              val imageUrl: String = \"\",
              val authorId: String = \"\",
              val authorName: String = \"\",
              val ingredients: List<Ingredient> = emptyList(),
              val steps: List<Step> = emptyList(),
              val tags: List<String> = emptyList(),
              val averageRating: Double = 0.0,
              val ratingCount: Int = 0,
              val likeCount: Int = 0,
              val likedBy: List<String> = emptyList(),
              val createdAt: Long = 0L
          )
          \`\`\`

          ## Zadaci
          - [ ] Kreiraj \`Recipe\` data class u \`domain/model\`
          - [ ] Dodaj mapper između Firestore dokumenta i domenskog modela" || true

      - name: "Data - Create Ingredient data model"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Create Ingredient data model" \
            --label "backend,feature" \
            --body "## Opis
          Kreirati domenski model za sastojak recepta.

          ## Implementacija
          \`\`\`kotlin
          data class Ingredient(
              val name: String = \"\",
              val amount: String = \"\",
              val unit: String = \"\"
          )
          \`\`\`

          ## Zadaci
          - [ ] Kreiraj \`Ingredient\` data class u \`domain/model\`" || true

      - name: "Data - Create Step data model"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Create Step data model" \
            --label "backend,feature" \
            --body "## Opis
          Kreirati domenski model za korak u receptu.

          ## Implementacija
          \`\`\`kotlin
          data class Step(
              val order: Int = 0,
              val description: String = \"\"
          )
          \`\`\`

          ## Zadaci
          - [ ] Kreiraj \`Step\` data class u \`domain/model\`" || true

      - name: "Data - Create Recipe repository"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Create Recipe repository" \
            --label "backend,firebase,feature" \
            --body "## Opis
          Implementirati repozitorij koji upravlja operacijama s receptima.

          ## Sučelje
          \`\`\`kotlin
          interface RecipeRepository {
              suspend fun getRecipes(): Resource<List<Recipe>>
              suspend fun getRecipeById(id: String): Resource<Recipe>
              suspend fun createRecipe(recipe: Recipe): Resource<String>
              suspend fun updateRecipe(recipe: Recipe): Resource<Unit>
              suspend fun deleteRecipe(id: String): Resource<Unit>
              fun getRecipesFlow(): Flow<Resource<List<Recipe>>>
          }
          \`\`\`

          ## Zadaci
          - [ ] Definiraj \`RecipeRepository\` interface
          - [ ] Implementiraj \`FirestoreRecipeRepository\`
          - [ ] Registriraj s Hilt
          - [ ] Provjeri CRUD operacije" || true

      - name: "Data - Implement recipe CRUD operations"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Implement recipe CRUD operations" \
            --label "backend,firebase,feature" \
            --body "## Opis
          Implementirati Create, Read, Update, Delete operacije za recepte u Firestoreu.

          ## Zadaci
          - [ ] **Create**: dodaj recept u kolekciju \`recipes\`
          - [ ] **Read**: dohvati sve recepte / recept po ID-u
          - [ ] **Update**: ažuriraj recept (samo autor može)
          - [ ] **Delete**: ukloni recept (samo autor može)
          - [ ] Postavi Firestore sigurnosna pravila za CRUD" || true

      # ── 6. Recipe UI ───────────────────────────────────────────────────────
      - name: "UI - Create RecipeCard component"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Create RecipeCard component" \
            --label "ui,feature" \
            --body "## Opis
          Kreirati višekratnu Jetpack Compose komponentu za prikaz recepta u listi.

          ## Sadržaj komponente
          - Slika recepta
          - Naslov recepta
          - Ime autora
          - Prosječna ocjena (⭐)
          - Broj lajkova (❤️)

          ## Zadaci
          - [ ] Kreiraj \`RecipeCard\` composable u \`ui/components\`
          - [ ] Koristi Coil za učitavanje slike
          - [ ] Dodaj placeholder sliku
          - [ ] Provjeri izgled na različitim veličinama ekrana" || true

      - name: "UI - Create Home screen (recipe feed)"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Create Home screen (recipe feed)" \
            --label "ui,feature" \
            --body "## Opis
          Kreirati početni ekran koji prikazuje feed recepata.

          ## Sadržaj
          - Lista recepata (\`LazyColumn\` s \`RecipeCard\`)
          - Search bar na vrhu
          - Bottom navigation
          - FAB za dodavanje recepta

          ## Zadaci
          - [ ] Kreiraj \`HomeScreen\` composable
          - [ ] Poveži s \`HomeViewModel\`
          - [ ] Dohvati recepte iz Firestorea
          - [ ] Prikaži loading / error / empty state" || true

      - name: "UI - Create Recipe Details screen"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Create Recipe Details screen" \
            --label "ui,feature" \
            --body "## Opis
          Kreirati ekran s detaljima odabranog recepta.

          ## Sadržaj
          - Velika slika recepta
          - Naslov i opis
          - Autor s linkom na profil
          - Lista sastojaka
          - Lista koraka pripreme
          - Ocjena i lajk gumbi
          - Gumb za uređivanje (ako je autor)

          ## Zadaci
          - [ ] Kreiraj \`RecipeDetailScreen\`
          - [ ] Prihvati \`recipeId\` kao navigation argument
          - [ ] Dohvati recept po ID-u
          - [ ] Prikaži sve sekcije" || true

      - name: "UI - Create Add Recipe screen"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Create Add Recipe screen" \
            --label "ui,feature" \
            --body "## Opis
          Kreirati ekran za dodavanje novog recepta.

          ## Polja
          - Naziv recepta
          - Opis
          - Slika (picker)
          - Sastojci (dinamičko dodavanje)
          - Koraci pripreme (dinamičko dodavanje)
          - Tagovi

          ## Zadaci
          - [ ] Kreiraj \`AddRecipeScreen\`
          - [ ] Implementiraj dinamičko dodavanje sastojaka i koraka
          - [ ] Poveži s \`RecipeViewModel\`
          - [ ] Spremi recept u Firestore
          - [ ] Navigiraj na detalje ili Home po završetku" || true

      - name: "UI - Create Edit Recipe screen"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Create Edit Recipe screen" \
            --label "ui,feature" \
            --body "## Opis
          Kreirati ekran za uređivanje postojećeg recepta.

          ## Zadaci
          - [ ] Kreiraj \`EditRecipeScreen\` (može rekoristiti \`AddRecipeScreen\`)
          - [ ] Predpopuni formu s postojećim podacima
          - [ ] Spremi izmjene u Firestore
          - [ ] Dostupno samo autoru recepta" || true

      - name: "UI - Implement image picker for recipes"
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Implement image picker for recipes" \
            --label "ui,feature" \
            --body "## Opis
          Implementirati odabir slike s galerije uređaja za recept.

          ## Zadaci
          - [ ] Dodaj \`ActivityResultContracts.GetContent\` launcher
